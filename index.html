<style>
  :root {
    --ui-bg: rgba(12, 14, 20, 0.55);
    --ui-border: rgba(255, 255, 255, 0.12);
    --ui-fg: rgba(240, 244, 255, 0.92);
    --ui-dim: rgba(240, 244, 255, 0.55);
    --ui-accent: #b8ffe8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #05070b; overflow: hidden; font-family: "Inter", "SF Pro Text", ui-sans-serif, system-ui, sans-serif; color: var(--ui-fg); }
  canvas#gl { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; cursor: crosshair; touch-action: none; }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px;
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ui-dim);
    pointer-events: none;
    z-index: 10;
    mix-blend-mode: plus-lighter;
  }
  .topbar .left, .topbar .right { display: flex; gap: 18px; align-items: center; }
  .topbar .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ui-accent); box-shadow: 0 0 12px var(--ui-accent);
  }

  .hero {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 5;
    text-align: center;
  }
  .hero .brand {
    font: 200 96px/0.95 "Inter", ui-sans-serif, system-ui, sans-serif;
    letter-spacing: -0.02em;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 6px 40px rgba(0,0,0,0.45);

  .hero .tagline {

    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.50);
  }

  .ghost {
    position: fixed; pointer-events: none;
    width: 24px; height: 24px; margin: -12px 0 0 -12px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.5);
    opacity: 0; transform: scale(0.6);
    z-index: 15;
    mix-blend-mode: plus-lighter;
  }
  .ghost.play { animation: ghost 650ms ease-out forwards; }
  @keyframes ghost {
    0% { opacity: 0.9; transform: scale(0.4); }
    100% { opacity: 0; transform: scale(3.2); }
  }

  .hero .contact {
    margin-top: 24px;
    display: flex; align-items: center; justify-content: center; gap: 24px;

    text-decoration: none;
    transition: color 160ms ease;

  .hero .contact a:hover { color: var(--ui-accent); }

<script id="vs" type="x-shader/x-vertex">
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }

<script id="fs_plasma" type="x-shader/x-fragment">
precision highp float;
uniform vec2 u_res; uniform float u_time;
uniform vec2 u_mouse; uniform vec2 u_click; uniform float u_clickT; uniform float u_energy;
uniform float u_day;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
float noise(vec2 p){
  vec2 i=floor(p), f=fract(p);
  float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
  vec2 u=f*f*(3.-2.*f);
  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
}
float fbm(vec2 p){
  float s=0., a=0.5;
  for(int i=0;i<5;i++){ s+=a*noise(p); p*=2.02; a*=0.5; }
  return s;
}

void main(){
  vec2 p = (gl_FragCoord.xy - 0.5*u_res.xy)/u_res.y;
  vec2 m = (u_mouse - 0.5) * vec2(u_res.x/u_res.y, 1.0);

  vec2 dv = p - m;
  float dist = length(dv) + 1e-4;
  float wellStrength = 0.35 * (0.7 + 0.8*u_energy);
  float sign = 1.0;
  if(u_clickT < 1.5) sign = mix(-1.5, 1.0, smoothstep(0.0, 1.5, u_clickT));

  vec2 warp = -sign * (dv/dist) * wellStrength * exp(-dist*1.4);

  vec2 q = p + warp;
  vec2 fq = vec2(fbm(q*1.3 + u_time*0.07), fbm(q*1.3 + u_time*0.07 + 7.3));
  float n = fbm(q*2.2 + fq*1.8 + u_time*0.05);

  // Thai day colors
  vec3 c1, c2, c3, c4;
  int day = int(u_day);
  if(day == 0){        // Sunday - red
    c1 = vec3(0.18, 0.03, 0.03);
    c2 = vec3(0.65, 0.08, 0.10);
    c3 = vec3(1.00, 0.25, 0.20);
    c4 = vec3(1.00, 0.75, 0.65);
  } else if(day == 1){ // Monday - yellow
    c1 = vec3(0.15, 0.12, 0.02);
    c2 = vec3(0.65, 0.55, 0.05);
    c3 = vec3(1.00, 0.85, 0.15);
    c4 = vec3(1.00, 0.97, 0.75);
  } else if(day == 2){ // Tuesday - pink
    c1 = vec3(0.15, 0.03, 0.10);
    c2 = vec3(0.70, 0.15, 0.45);
    c3 = vec3(1.00, 0.40, 0.70);
    c4 = vec3(1.00, 0.82, 0.90);
  } else if(day == 3){ // Wednesday - green
    c1 = vec3(0.02, 0.12, 0.05);
    c2 = vec3(0.08, 0.50, 0.20);
    c3 = vec3(0.20, 0.82, 0.40);
    c4 = vec3(0.75, 1.00, 0.85);
  } else if(day == 4){ // Thursday - orange
    c1 = vec3(0.18, 0.08, 0.02);
    c2 = vec3(0.70, 0.35, 0.05);
    c3 = vec3(1.00, 0.60, 0.15);
    c4 = vec3(1.00, 0.88, 0.65);
  } else if(day == 5){ // Friday - blue
    c1 = vec3(0.03, 0.05, 0.18);
    c2 = vec3(0.10, 0.25, 0.65);
    c3 = vec3(0.25, 0.55, 1.00);
    c4 = vec3(0.70, 0.88, 1.00);
  } else {             // Saturday - purple
    c1 = vec3(0.10, 0.03, 0.18);
    c2 = vec3(0.40, 0.10, 0.65);
    c3 = vec3(0.65, 0.30, 1.00);
    c4 = vec3(0.88, 0.75, 1.00);
  }

  vec3 col = mix(c1, c2, smoothstep(0.25, 0.55, n));
  col = mix(col, c3, smoothstep(0.55, 0.75, n));
  col = mix(col, c4, smoothstep(0.78, 0.92, n));

  float lines = abs(fract(n*9.0) - 0.5);
  col += smoothstep(0.05, 0.0, lines) * 0.08;

  col += vec3(1.0,0.95,0.85) * exp(-dist*dist*18.0) * (0.15 + 0.35*u_energy);

  if(u_clickT < 0.8){
    vec2 cp = (u_click - 0.5) * vec2(u_res.x/u_res.y, 1.0);
    col += vec3(1.0,0.7,0.5) * exp(-length(p-cp)*3.5) * exp(-u_clickT*4.0) * 0.6;
  }

  col *= 1.0 - 0.32*dot(p,p);
  col += (hash(gl_FragCoord.xy+u_time)-0.5)*0.012;

  gl_FragColor = vec4(col, 1.0);
}
</script>

<script>
(() => {
  const canvas = document.getElementById('gl');
  const gl = canvas.getContext('webgl', { antialias: false, premultipliedAlpha: false });
  if(!gl){ document.body.innerHTML = '<div style="color:#fff;padding:40px;font-family:sans-serif">WebGL not supported.</div>'; return; }

  // ---------- GL setup ----------
  const vsSrc = document.getElementById('vs').textContent;
  const fsSrc = document.getElementById('fs_plasma').textContent;

  function compile(type, src){
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if(!gl.getShaderParameter(sh, gl.COMPILE_STATUS)){
      console.error('Shader compile error:', gl.getShaderInfoLog(sh));
    }
    return sh;
  }

  const vs = compile(gl.VERTEX_SHADER, vsSrc);
  const fs = compile(gl.FRAGMENT_SHADER, fsSrc);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog, gl.LINK_STATUS)){
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }

  const P = {
    prog,
    u_res: gl.getUniformLocation(prog, 'u_res'),
    u_time: gl.getUniformLocation(prog, 'u_time'),
    u_mouse: gl.getUniformLocation(prog, 'u_mouse'),
    u_click: gl.getUniformLocation(prog, 'u_click'),
    u_clickT: gl.getUniformLocation(prog, 'u_clickT'),
    u_energy: gl.getUniformLocation(prog, 'u_energy'),
    u_day: gl.getUniformLocation(prog, 'u_day'),
    a_pos: gl.getAttribLocation(prog, 'a_pos'),
  };

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

  // ---------- State ----------
  const state = {
    mouse: [0.5, 0.5],
    mouseS: [0.5, 0.5],
    lastMouse: [0.5, 0.5],
    energy: 0,
    click: [0.5, 0.5],
    clickT: 999,
    startTime: performance.now(),
    lastFrame: performance.now(),
  };

  // ---------- Resize ----------
  function resize(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = Math.floor(window.innerWidth * dpr);
    const h = Math.floor(window.innerHeight * dpr);
    if(canvas.width !== w || canvas.height !== h){
      canvas.width = w; canvas.height = h;
    }
    gl.viewport(0, 0, w, h);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- Input ----------
  window.addEventListener('pointermove', (e) => {
    state.mouse[0] = e.clientX / window.innerWidth;
    state.mouse[1] = 1.0 - e.clientY / window.innerHeight;
  });
  window.addEventListener('pointerdown', (e) => {
    if(e.target.closest('.topbar')) return;
    state.click[0] = e.clientX / window.innerWidth;
    state.click[1] = 1.0 - e.clientY / window.innerHeight;
    state.clickT = 0;
    const g = document.createElement('div');
    g.className = 'ghost play';
    g.style.left = e.clientX+'px';
    g.style.top = e.clientY+'px';
    document.body.appendChild(g);
    setTimeout(()=>g.remove(), 700);
  });

  // ---------- Clock ----------
  const clockEl = document.getElementById('clock');
  const dateEl = document.getElementById('date');
  function tickClock(){
    const d = new Date();
    clockEl.textContent = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    dateEl.textContent = d.toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'}).toUpperCase();
  }
  tickClock();
  setInterval(tickClock, 15000);

  // ---------- Render ----------
  function frame(now){
    const dt = Math.min(0.05, (now - state.lastFrame)/1000);
    state.lastFrame = now;
    state.clickT += dt;

    const k = 1 - Math.pow(0.001, dt);
    state.mouseS[0] += (state.mouse[0] - state.mouseS[0]) * k;
    state.mouseS[1] += (state.mouse[1] - state.mouseS[1]) * k;

    const vx = state.mouse[0] - state.lastMouse[0];
    const vy = state.mouse[1] - state.lastMouse[1];
    state.lastMouse[0] = state.mouse[0];
    state.lastMouse[1] = state.mouse[1];
    const vMag = Math.min(1.0, Math.hypot(vx, vy) * 18);
    state.energy += (vMag - state.energy) * Math.min(1, dt*8);

    gl.useProgram(P.prog);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.enableVertexAttribArray(P.a_pos);
    gl.vertexAttribPointer(P.a_pos, 2, gl.FLOAT, false, 0, 0);
    gl.uniform2f(P.u_res, canvas.width, canvas.height);
    gl.uniform1f(P.u_time, (now - state.startTime)/1000);
    gl.uniform2f(P.u_mouse, state.mouseS[0], state.mouseS[1]);
    gl.uniform2f(P.u_click, state.click[0], state.click[1]);
    gl.uniform1f(P.u_clickT, state.clickT);
    gl.uniform1f(P.u_energy, state.energy);
    gl.uniform1f(P.u_day, new Date().getDay());
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
